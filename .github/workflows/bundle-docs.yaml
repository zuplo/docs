name: Bundle Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "policies/**"
      - "scripts/generate-policies.ts"
      - "scripts/bundle-docs.sh"
      - ".github/workflows/bundle-docs.yaml"
  workflow_dispatch:

jobs:
  bundle:
    name: Build Docs Bundle
    runs-on: ubuntu-latest

    env:
      GITHUB_NPM_TOKEN: ${{ secrets.GH_CUSTOM_TOKEN }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: "true"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # postinstall runs policies:get, policies:generate, api:get, etc.
      - run: pnpm install --frozen-lockfile

      - name: Bundle docs
        run: pnpm run docs:bundle

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-bundle
          path: docs-bundle.zip
          retention-days: 90
